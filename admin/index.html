<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotman PhD — Admin</title>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'benhma94/Rotman-PhD-Website',
          branch: 'master',
          auth_type: 'pkce',
          app_id: 'Ov23liKN0jT58PUBMDzZ'
        },
        media_folder: 'assets/uploads',
        public_folder: '/assets/uploads',
        collections: [
          {
            name: 'notices',
            label: 'Notices',
            label_singular: 'Notice',
            folder: '_notices',
            create: true,
            slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
            editor: { preview: false },
            fields: [
              { label: 'Title',  name: 'title',  widget: 'string' },
              { label: 'Date',   name: 'date',   widget: 'date', format: 'YYYY-MM-DD' },
              { label: 'Body',   name: 'body',   widget: 'text',    required: false },
              { label: 'Pinned', name: 'pinned', widget: 'boolean', default: false }
            ]
          },
          {
            name: 'events',
            label: 'Events & Deadlines',
            label_singular: 'Event',
            folder: '_events',
            create: true,
            slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
            editor: { preview: false },
            fields: [
              { label: 'Title',    name: 'title',    widget: 'string' },
              { label: 'Date',     name: 'date',     widget: 'date', format: 'YYYY-MM-DD' },
              { label: 'Location', name: 'location', widget: 'string',  required: false },
              {
                label: 'Type', name: 'type', widget: 'select',
                options: [
                  { label: 'Event',    value: 'event' },
                  { label: 'Deadline', value: 'deadline' }
                ],
                default: 'event'
              }
            ]
          },
          {
            name: 'resources',
            label: 'Resources',
            label_singular: 'Resource',
            folder: '_resources',
            create: true,
            slug: '{{slug}}',
            editor: { preview: false },
            fields: [
              { label: 'Title',       name: 'title',       widget: 'string' },
              { label: 'URL',         name: 'url',         widget: 'string' },
              {
                label: 'Category', name: 'category', widget: 'select',
                options: ['Guides', 'Policies', 'Forms', 'Admin']
              },
              { label: 'Description', name: 'description', widget: 'text',    required: false },
              { label: 'Pinned',      name: 'pinned',      widget: 'boolean', default: false }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>

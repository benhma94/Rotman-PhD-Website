backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
  branch: main
  auth_type: pkce
  app_id: YOUR_OAUTH_APP_CLIENT_ID

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: notices
    label: Notices
    label_singular: Notice
    folder: _notices
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: Title,  name: title,  widget: string }
      - { label: Date,   name: date,   widget: date,    format: YYYY-MM-DD }
      - { label: Body,   name: body,   widget: text,    required: false }
      - { label: Pinned, name: pinned, widget: boolean, default: false }

  - name: events
    label: Events & Deadlines
    label_singular: Event
    folder: _events
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: Title,    name: title,    widget: string }
      - { label: Date,     name: date,     widget: date,   format: YYYY-MM-DD }
      - { label: Location, name: location, widget: string, required: false }
      - label: Type
        name: type
        widget: select
        options:
          - { label: Event,    value: event }
          - { label: Deadline, value: deadline }
        default: event

  - name: resources
    label: Resources
    label_singular: Resource
    folder: _resources
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: Title,       name: title,       widget: string }
      - { label: URL,         name: url,         widget: string }
      - label: Category
        name: category
        widget: select
        options: [Guides, Policies, Forms, Admin]
      - { label: Description, name: description, widget: text,    required: false }
      - { label: Pinned,      name: pinned,      widget: boolean, default: false }

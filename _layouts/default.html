<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  {% include password-gate.html %}

  <div class="site-shell" id="site-shell" style="display:none">
    <header class="top-bar">
      <span class="site-title">Rotman PhD Association</span>
      <span class="academic-year">2025–2026</span>
    </header>
    <div class="layout">
      {% include sidebar.html %}
      <main class="content">
        {{ content }}
      </main>
    </div>
  </div>

  <!-- Notice dialog (shared across pages) -->
  <div id="notice-dialog" class="notice-dialog-overlay">
    <div class="notice-dialog-box" role="dialog" aria-modal="true" aria-labelledby="notice-dialog-title">
      <div class="notice-dialog-header">
        <div>
          <div class="notice-date" id="notice-dialog-date"></div>
          <h2 class="notice-dialog-title" id="notice-dialog-title"></h2>
        </div>
        <button class="notice-dialog-close" id="notice-dialog-close" aria-label="Close">&times;</button>
      </div>
      <div class="notice-dialog-body" id="notice-dialog-body"></div>
    </div>
  </div>

  <script src="{{ '/assets/js/auth.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/notice-dialog.js' | relative_url }}"></script>
</body>
</html>

---
layout: default
---

<div class="page-header">
  <h1>{{ page.title }}</h1>
  {% if page.category %}
  <div class="resource-meta">{{ page.category }}</div>
  {% endif %}
</div>

<article class="resource-document">
  {% if page.description %}
  <p class="resource-summary">{{ page.description }}</p>
  {% endif %}

  {{ content }}

  {% if page.link %}
  <p class="resource-source">
    <a href="{{ page.link }}" target="_blank" rel="noopener noreferrer">Open resource</a>
  </p>
  {% endif %}
</article>

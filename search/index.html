---
title: Search
permalink: /search/
---
<div class="page-header">
  <h1>🔍 Search</h1>
</div>
<div class="search-container">
  <input type="search" id="search-input" class="search-input"
         placeholder="Search events, notices, resources…"
         autofocus autocomplete="off">
  <div id="search-results" class="search-results" aria-live="polite"></div>
</div>

<script src="https://unpkg.com/lunr/lunr.js"></script>
<script>
(function () {
  var idx, docs;

  fetch('{{ "/search.json" | relative_url }}')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      docs = [].concat(data.notices, data.events, data.resources);
      idx = lunr(function () {
        this.ref('id');
        this.field('title', { boost: 10 });
        this.field('body');
        var self = this;
        docs.forEach(function (d) { self.add(d); });
      });
    });

  document.getElementById('search-input').addEventListener('input', function () {
    var q = this.value.trim();
    var container = document.getElementById('search-results');
    if (!q || !idx) { container.innerHTML = ''; return; }

    var results;
    try { results = idx.search(q + '~1'); } catch (e) { results = idx.search(q); }

    if (results.length === 0) {
      container.innerHTML = '<p class="search-no-results">No results for <strong>' + esc(q) + '</strong></p>';
      return;
    }

    var docMap = {};
    docs.forEach(function (d) { docMap[d.id] = d; });

    container.innerHTML = results.slice(0, 20).map(function (r) {
      var d = docMap[r.ref];
      if (!d) return '';
      return '<a href="' + esc(d.url) + '" class="search-result">' +
        '<span class="search-result-type search-result-type--' + d.type + '">' + d.type + '</span>' +
        '<span class="search-result-title">' + esc(d.title) + '</span>' +
        (d.body ? '<span class="search-result-excerpt">' + esc(d.body.slice(0, 120)) + '…</span>' : '') +
        '</a>';
    }).join('');
  });

  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
}());
</script>

---
title: Events
---

<div class="page-header">
  <h1>📅 Events & Deadlines</h1>
</div>

<div class="view-tabs">
  <button type="button" class="view-tab active" data-view="calendar">📅 Calendar</button>
  <button type="button" class="view-tab" data-view="list">☰ List</button>
</div>
<button type="button"
        class="cal-subscribe-btn"
        id="calendar-subscribe"
        data-calendar-url="{{ '/events.ics' | absolute_url }}"
        data-webcal-url="{{ '/events.ics' | absolute_url | replace_first: 'https://', 'webcal://' }}"
        aria-haspopup="dialog">📅 Subscribe to Calendar</button>

<div id="calendar-view">
  <div class="cal-nav">
    <button type="button" class="cal-prev">←</button>
    <span class="cal-month-label"></span>
    <button type="button" class="cal-next">→</button>
  </div>
  <div class="cal-grid"></div>
  <div class="cal-detail"></div>
</div>

<div id="list-view">
  {% assign sorted_events = site.events | sort: "date" %}
  {% for event in sorted_events %}
  <button type="button"
       class="event-full-item"
       data-title="{{ event.title | escape }}{% if event.type == 'deadline' %} ⚠️{% endif %}"
       data-subtitle="{{ event.date | date: '%B %-d, %Y' }}{% if event.type == 'deadline' %} · Deadline{% endif %}"
       data-description="{{ event.description | escape }}"
       data-location="{{ event.location | escape }}"
       data-start-time="{{ event.start_time }}"
       data-end-time="{{ event.end_time }}"
       {% if event.attachments %}data-attachments="{{ event.attachments | jsonify | escape }}"{% endif %}
       aria-haspopup="dialog">
    <div class="event-full-badge {% if event.type == 'deadline' %}deadline{% endif %}">
      <div class="badge-day">{{ event.date | date: "%-d" }}</div>
      <div class="badge-month">{{ event.date | date: "%b %Y" }}</div>
    </div>
    <div class="event-info">
      <h3>{{ event.title }}{% if event.type == 'deadline' %} ⚠️{% endif %}</h3>
      {% if event.location %}
      <div class="event-location">📍 {{ event.location }}</div>
      {% endif %}
    </div>
  </button>
  {% endfor %}
</div>

<script type="application/json" id="events-data">
[{% assign sorted_events = site.events | sort: "date" %}{% for event in sorted_events %}{% unless forloop.first %},{% endunless %}{"title":{{ event.title | jsonify }},"date":"{{ event.date | date: "%Y-%m-%d" }}","type":"{{ event.type }}","location":{{ event.location | default: "" | jsonify }},"description":{{ event.description | default: "" | jsonify }},"start_time":{{ event.start_time | default: "" | jsonify }},"end_time":{{ event.end_time | default: "" | jsonify }},"attachments":{% if event.attachments %}{{ event.attachments | jsonify }}{% else %}[]{% endif %}}{% endfor %}]
</script>
<script src="{{ '/assets/js/calendar.js' | relative_url }}"></script>
